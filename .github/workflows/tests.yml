name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Build dev image (Python ${{ matrix.python-version }})
        run: docker build -t fermax-blue-dev --build-arg PYTHON_VERSION=${{ matrix.python-version }} -f Dockerfile.dev .

      - name: Run tests
        run: docker run --rm -v $PWD:/app -w /app fermax-blue-dev pytest tests/ -v --cov=custom_components/fermax_blue --cov-report=term-missing --cov-fail-under=40 --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build dev image
        run: docker build -t fermax-blue-dev -f Dockerfile.dev .

      - name: Lint
        run: docker run --rm -v $PWD:/app -w /app fermax-blue-dev ruff check custom_components/ tests/ scripts/

      - name: Format check
        run: docker run --rm -v $PWD:/app -w /app fermax-blue-dev ruff format --check custom_components/ tests/ scripts/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build dev image
        run: docker build -t fermax-blue-dev -f Dockerfile.dev .

      - name: Type check
        run: docker run --rm -v $PWD:/app -w /app fermax-blue-dev mypy custom_components/fermax_blue/ --ignore-missing-imports

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build dev image
        run: docker build -t fermax-blue-dev -f Dockerfile.dev .
      - name: Dead code check
        run: docker run --rm -v $PWD:/app -w /app fermax-blue-dev vulture custom_components/fermax_blue/ .vulture_whitelist.py --min-confidence 80

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
