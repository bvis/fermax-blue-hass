# Fermax Blue Dashboard Card
#
# This is a Lovelace card template (not a blueprint — HA doesn't support Lovelace blueprints).
# Copy and paste into your dashboard YAML, replacing entity IDs with your own.
#
# Prerequisites:
# - Fermax Blue integration installed and configured
# - mushroom-cards installed via HACS (for status indicators)
#
# To find your entity IDs, go to Settings > Devices > your Fermax device

type: vertical-stack
title: Videoportero
cards:
  # Camera with live stream support
  - type: picture-entity
    entity: camera.DEVICE_NAME_visitor     # Replace DEVICE_NAME
    camera_view: live
    show_state: false
    show_name: true

  # Main actions: camera preview + record + open door
  - type: horizontal-stack
    cards:
      - type: button
        entity: button.DEVICE_NAME_camera_preview   # Replace
        name: Ver cámara
        icon: mdi:cctv
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.DEVICE_NAME_camera_preview   # Replace
      - type: button
        name: Grabar
        icon: mdi:record-circle
        icon_color: red
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.DEVICE_NAME_camera_preview   # Replace — starts stream + records
      - type: button
        entity: button.DEVICE_NAME_open_DOOR   # Replace DOOR with your door name
        name: Abrir portal
        icon: mdi:door-open
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.DEVICE_NAME_open_DOOR   # Replace

  # Auxiliary actions: cast + F1 + call guard + send audio
  - type: horizontal-stack
    cards:
      - type: button
        name: Enviar a pantalla
        icon: mdi:cast
        tap_action:
          action: call-service
          service: media_player.play_media
          target:
            entity_id: media_player.YOUR_CAST_DEVICE   # Replace with your Google Hub / Android TV / Chromecast
          data:
            media_content_id: "{{ states.camera.DEVICE_NAME_visitor.attributes.entity_picture }}"   # Replace DEVICE_NAME
            media_content_type: image/jpeg
      - type: button
        entity: button.DEVICE_NAME_f1   # Replace
        name: F1
        icon: mdi:numeric-1-box
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.DEVICE_NAME_f1   # Replace
      - type: button
        entity: button.DEVICE_NAME_call_guard   # Replace
        name: Portero
        icon: mdi:account-tie
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.DEVICE_NAME_call_guard   # Replace
      - type: button
        name: Enviar audio
        icon: mdi:microphone
        tap_action:
          action: call-service
          service: fermax_blue.send_audio
          service_data:
            audio_file: /config/media/mi_mensaje.wav   # Replace with your audio file

  # Events (requires mushroom-cards)
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: event.DEVICE_NAME_doorbell   # Replace — doorbell ring events
        name: Timbre
        icon: mdi:bell-ring
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: binary_sensor.DEVICE_NAME_connection   # Replace
        name: Conexión
        icon: mdi:wifi
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: lock.DEVICE_NAME_DOOR_lock   # Replace
        name: Portal
        icon: mdi:door
        layout: vertical
        tap_action:
          action: toggle

  # Event history: door opened + camera on
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: event.DEVICE_NAME_door_opened   # Replace — door opening events
        name: Puerta
        icon: mdi:door-open
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: event.DEVICE_NAME_camera_on   # Replace — camera activation events
        name: Cámara
        icon: mdi:cctv
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: sensor.DEVICE_NAME_last_call   # Replace — last call timestamp
        name: Última llamada
        icon: mdi:phone
        layout: vertical

  # Switches: DND, photo caller, notifications
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: switch.DEVICE_NAME_dnd   # Replace
        name: No molestar
        icon: mdi:bell-off
        layout: vertical
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: switch.DEVICE_NAME_photo_caller   # Replace
        name: Foto
        icon: mdi:camera-account
        layout: vertical
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: switch.DEVICE_NAME_notifications   # Replace
        name: Notif.
        icon: mdi:bell
        layout: vertical
        tap_action:
          action: toggle

  # Info + recordings
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.DEVICE_NAME_wifi_signal   # Replace
        name: WiFi
        icon: mdi:wifi
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: sensor.DEVICE_NAME_last_opening   # Replace
        name: Apertura
        icon: mdi:door-open
        layout: vertical
      - type: button
        name: Grabaciones
        icon: mdi:filmstrip
        tap_action:
          action: navigate
          navigation_path: /media-browser/media-source%3A%2F%2Fmedia_source%2Flocal%2Ffermax_recordings
